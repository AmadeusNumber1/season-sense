<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SeasonSense</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="header">
        <div class="brand">
          <img src="./logo.svg" alt="SeasonSense logo" class="logo" />
          <div>
            <h1>SeasonSense</h1>
            <p>Simple seasonal allergy insight for where you are.</p>
          </div>
        </div>
      </header>

      <section class="controls glass">
        <button id="locateBtn" class="btn-primary">Use my location</button>
        <div class="search-group">
          <input id="cityInput" type="text" placeholder="Search city" />
          <button id="searchBtn" class="btn-ghost">Search</button>
        </div>
      </section>

      <section id="status" class="status"></section>
      <section id="modeBadge" class="mode-badge" hidden></section>
      <section id="locationBrief" class="location-brief" hidden></section>

      <section id="summary" class="summary-grid"></section>

      <section id="airExplain" class="glass explain-wrap" hidden>
        <h2>What’s in the air?</h2>
        <p id="airExplainText"></p>
      </section>

      <section id="driversWrap" class="glass explain-wrap" hidden>
        <h2>Why you may feel it</h2>
        <p id="driversText"></p>
      </section>

      <section id="symptomsWrap" class="glass explain-wrap" hidden>
        <h2>Likely symptoms today</h2>
        <p id="symptomsText"></p>
      </section>

      <section id="adviceWrap" class="glass advice-wrap" hidden>
        <h2>Risk advice</h2>
        <p id="adviceText"></p>
      </section>

      <section id="coldCheckWrap" class="glass explain-wrap" hidden>
        <h2>Cold vs allergies (quick check)</h2>
        <p id="coldCheckText"></p>
      </section>

      <section class="glass forecast-wrap">
        <h2>7-day outlook</h2>
        <div id="forecast" class="forecast-grid"></div>
      </section>

      <section class="glass source-wrap">
        <h2>Data sources</h2>
        <div id="sources" class="sources"></div>
      </section>
    </main>

    <script src="./script.js?v=10" defer></script>
  </body>
</html>
